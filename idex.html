<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Course Registration & Evaluation</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Chart.js CDN -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Supabase JS CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen pb-12">

    <!-- Header -->
    <header class="bg-white border-b py-8 mb-8">
        <div class="max-w-5xl mx-auto px-4 text-center">
            <h1 class="text-3xl font-bold text-slate-800">AI & Dev Readiness Registration</h1>
            <p class="text-slate-500 mt-2">Evaluate your skills and register for the upcoming cohort.</p>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-4">
        <form id="registrationForm" class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            
            <!-- Section 1: Registration Form -->
            <div class="lg:col-span-1 space-y-6">
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                    <h2 class="text-xl font-semibold mb-4 flex items-center text-indigo-600">
                        <span class="mr-2">1.</span> Personal Info
                    </h2>
                    <div class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-slate-700">Full Name</label>
                            <input type="text" id="fullName" required class="mt-1 block w-full rounded-md border-slate-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 p-2 border" placeholder="John Doe">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-slate-700">Email Address</label>
                            <input type="email" id="email" required class="mt-1 block w-full rounded-md border-slate-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 p-2 border" placeholder="john@example.com">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-slate-700">Phone Number</label>
                            <input type="tel" id="phone" required class="mt-1 block w-full rounded-md border-slate-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 p-2 border" placeholder="+1 234 567 890">
                        </div>
                    </div>
                </div>

                <!-- Section 3: Analytics Dashboard (Visible on Desktop) -->
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                    <h2 class="text-xl font-semibold mb-4 flex items-center text-indigo-600">
                        <span class="mr-2">3.</span> Readiness Profile
                    </h2>
                    <div class="h-64">
                        <canvas id="readinessChart"></canvas>
                    </div>
                    <p class="text-xs text-center text-slate-400 mt-4 italic">Chart updates automatically as you select levels.</p>
                </div>

                <button type="submit" id="submitBtn" class="w-full bg-indigo-600 text-white py-4 rounded-xl font-bold text-lg hover:bg-indigo-700 transition-all shadow-lg shadow-indigo-200">
                    Complete Registration
                </button>
            </div>

            <!-- Section 2: AI & Dev Readiness Checklist -->
            <div class="lg:col-span-2">
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                    <h2 class="text-xl font-semibold mb-6 flex items-center text-indigo-600">
                        <span class="mr-2">2.</span> Skill Evaluation Checklist
                    </h2>
                    
                    <div class="space-y-6" id="checklistContainer">
                        <!-- Skill Item Template -->
                        <!-- Topics: Computer Skills, AI Basics, GitHub, Vercel, Gemini, ChatGPT, Claude -->
                        <script>
                            const topics = [
                                { id: 'computer', label: 'Computer Skills', desc: 'General usage and installation' },
                                { id: 'ai_basics', label: 'AI Basics', desc: 'Concepts of Artificial Intelligence' },
                                { id: 'github', label: 'GitHub', desc: 'Repository management and hosting' },
                                { id: 'vercel', label: 'Vercel', desc: 'Deployment basics' },
                                { id: 'gemini', label: 'Gemini', desc: 'Prompting and usage' },
                                { id: 'chatgpt', label: 'ChatGPT', desc: 'Prompting and usage' },
                                { id: 'claude', label: 'Claude', desc: 'Prompting and usage' }
                            ];

                            document.write(topics.map(topic => `
                                <div class="p-4 rounded-xl bg-slate-50 border border-slate-100">
                                    <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
                                        <div>
                                            <h3 class="font-bold text-slate-800">${topic.label}</h3>
                                            <p class="text-xs text-slate-500">${topic.desc}</p>
                                        </div>
                                        <div class="flex gap-4">
                                            ${['None', 'Intermediate', 'Advanced'].map((level, idx) => `
                                                <label class="flex items-center space-x-2 cursor-pointer">
                                                    <input type="radio" name="${topic.id}" value="${idx}" ${idx === 0 ? 'checked' : ''} 
                                                        class="skill-input w-4 h-4 text-indigo-600 focus:ring-indigo-500 border-slate-300">
                                                    <span class="text-sm text-slate-600">${level}</span>
                                                </label>
                                            `).join('')}
                                        </div>
                                    </div>
                                </div>
                            `).join(''));
                        </script>
                    </div>
                </div>
            </div>
        </form>
    </main>

    <script>
        // --- 1. SUPABASE CONFIGURATION ---
        // Replace these with your actual Supabase project details
        const SUPABASE_URL = 'YOUR_SUPABASE_URL_HERE';
        const SUPABASE_ANON_KEY = 'YOUR_SUPABASE_ANON_KEY_HERE';
        
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // --- 2. CHART.JS INITIALIZATION ---
        const ctx = document.getElementById('readinessChart').getContext('2d');
        let readinessChart = new Chart(ctx, {
            type: 'radar',
            data: {
                labels: topics.map(t => t.label),
                datasets: [{
                    label: 'Skill Level',
                    data: topics.map(() => 0),
                    backgroundColor: 'rgba(79, 70, 229, 0.2)',
                    borderColor: 'rgba(79, 70, 229, 1)',
                    borderWidth: 2,
                    pointBackgroundColor: 'rgba(79, 70, 229, 1)'
                }]
            },
            options: {
                scales: {
                    r: {
                        beginAtZero: true,
                        max: 2,
                        ticks: { stepSize: 1, display: false }
                    }
                },
                plugins: { legend: { display: false } },
                maintainAspectRatio: false
            }
        });

        // --- 3. DYNAMIC UPDATES ---
        function updateChart() {
            const scores = topics.map(topic => {
                const selected = document.querySelector(`input[name="${topic.id}"]:checked`);
                return parseInt(selected.value);
            });
            readinessChart.data.datasets[0].data = scores;
            readinessChart.update();
        }

        // Listen for changes on any radio button
        document.querySelectorAll('.skill-input').forEach(input => {
            input.addEventListener('change', updateChart);
        });

        // --- 4. FORM SUBMISSION ---
        const form = document.getElementById('registrationForm');
        const submitBtn = document.getElementById('submitBtn');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // UI State: Loading
            submitBtn.disabled = true;
            submitBtn.innerText = 'Registering...';
            submitBtn.classList.add('opacity-50');

            // Gather Data
            const formData = {
                full_name: document.getElementById('fullName').value,
                email: document.getElementById('email').value,
                phone: document.getElementById('phone').value,
                evaluation_scores: topics.reduce((acc, topic) => {
                    acc[topic.id] = parseInt(document.querySelector(`input[name="${topic.id}"]:checked`).value);
                    return acc;
                }, {})
            };

            try {
                // Insert into Supabase
                const { data, error } = await supabase
                    .from('trainees')
                    .insert([formData]);

                if (error) throw error;

                alert('Registration Successful! Your readiness profile has been saved.');
                form.reset();
                updateChart();

            } catch (error) {
                console.error('Error:', error);
                alert('Error connecting to Supabase. Please check your URL/Key and table setup.');
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerText = 'Complete Registration';
                submitBtn.classList.remove('opacity-50');
            }
        });

        // Initial chart render
        updateChart();
    </script>
</body>
</html>
