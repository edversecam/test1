<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkillUp | AI & Dev Registration</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
        .glass-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        .skill-card input:checked + div {
            border-color: #4f46e5;
            background-color: #eef2ff;
            box-shadow: 0 0 0 2px #4f46e5;
        }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    </style>
</head>
<body class="text-slate-900 antialiased">

    <!-- Decorative Background Elements -->
    <div class="fixed top-0 left-0 w-full h-full -z-10 overflow-hidden opacity-40">
        <div class="absolute -top-[10%] -left-[10%] w-[40%] h-[40%] rounded-full bg-indigo-200 blur-[120px]"></div>
        <div class="absolute bottom-[10%] right-[0%] w-[30%] h-[30%] rounded-full bg-blue-200 blur-[100px]"></div>
    </div>

    <div class="max-w-7xl mx-auto px-6 py-10">
        <!-- Header -->
        <header class="flex flex-col md:flex-row md:items-center justify-between mb-12 gap-6">
            <div>
                <span class="px-3 py-1 text-xs font-bold tracking-widest text-indigo-600 uppercase bg-indigo-100 rounded-full">2024 Cohort</span>
                <h1 class="text-4xl font-extrabold tracking-tight text-slate-900 mt-3">Course Registration</h1>
                <p class="text-slate-500 mt-2 text-lg">Evaluate your readiness and secure your spot.</p>
            </div>
            <div class="flex items-center gap-4 bg-white p-2 rounded-2xl shadow-sm border border-slate-100">
                <div class="h-12 w-12 rounded-xl bg-indigo-600 flex items-center justify-center text-white shadow-lg shadow-indigo-200">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" />
                    </svg>
                </div>
                <div>
                    <p class="text-xs text-slate-400 font-medium uppercase">System Status</p>
                    <p class="text-sm font-bold text-emerald-500 flex items-center">
                        <span class="h-2 w-2 bg-emerald-500 rounded-full mr-2 animate-pulse"></span> Ready to Sync
                    </p>
                </div>
            </div>
        </header>

        <form id="registrationForm" class="grid grid-cols-12 gap-8">
            
            <!-- Left Column: Registration & Analytics -->
            <div class="col-span-12 lg:col-span-4 space-y-8">
                
                <!-- Section 1: User Info -->
                <section class="glass-card p-8 rounded-3xl shadow-xl shadow-slate-200/50">
                    <h2 class="text-xl font-bold mb-6 flex items-center">
                        <span class="w-8 h-8 rounded-lg bg-slate-900 text-white flex items-center justify-center text-sm mr-3">01</span>
                        Personal Details
                    </h2>
                    <div class="space-y-5">
                        <div class="group">
                            <label class="block text-sm font-semibold text-slate-700 mb-1 group-focus-within:text-indigo-600 transition-colors">Full Name</label>
                            <input type="text" id="fullName" required class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-500 outline-none transition-all bg-white/50" placeholder="Enter your name">
                        </div>
                        <div class="group">
                            <label class="block text-sm font-semibold text-slate-700 mb-1 group-focus-within:text-indigo-600 transition-colors">Email Address</label>
                            <input type="email" id="email" required class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-500 outline-none transition-all bg-white/50" placeholder="name@company.com">
                        </div>
                        <div class="group">
                            <label class="block text-sm font-semibold text-slate-700 mb-1 group-focus-within:text-indigo-600 transition-colors">Phone Number</label>
                            <input type="tel" id="phone" required class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-500 outline-none transition-all bg-white/50" placeholder="+1 (555) 000-0000">
                        </div>
                    </div>
                </section>

                <!-- Section 3: Analytics Dashboard -->
                <section class="glass-card p-8 rounded-3xl shadow-xl shadow-slate-200/50 overflow-hidden relative">
                    <h2 class="text-xl font-bold mb-2 flex items-center">
                        <span class="w-8 h-8 rounded-lg bg-slate-900 text-white flex items-center justify-center text-sm mr-3">03</span>
                        Readiness Radar
                    </h2>
                    <p class="text-sm text-slate-500 mb-6">Your skill distribution visualized.</p>
                    <div class="h-72 relative z-10">
                        <canvas id="readinessChart"></canvas>
                    </div>
                </section>

                <button type="submit" id="submitBtn" class="w-full bg-slate-900 text-white py-5 rounded-2xl font-bold text-lg hover:bg-indigo-600 transition-all shadow-xl shadow-indigo-200 flex items-center justify-center gap-3 group">
                    Submit Registration
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 group-hover:translate-x-1 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3" />
                    </svg>
                </button>
            </div>

            <!-- Right Column: Evaluation Checklist -->
            <div class="col-span-12 lg:col-span-8">
                <section class="glass-card p-8 rounded-3xl shadow-xl shadow-slate-200/50 h-full">
                    <div class="flex items-center justify-between mb-8">
                        <h2 class="text-xl font-bold flex items-center">
                            <span class="w-8 h-8 rounded-lg bg-slate-900 text-white flex items-center justify-center text-sm mr-3">02</span>
                            Skill Self-Assessment
                        </h2>
                        <span id="completionBadge" class="text-xs font-bold bg-slate-100 text-slate-500 px-3 py-1 rounded-full transition-all">0/7 Completed</span>
                    </div>
                    
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4" id="checklistContainer">
                        <!-- Skill Cards will be injected here by JS -->
                    </div>
                </section>
            </div>
        </form>
    </div>

    <script>
        // --- CONFIGURATION ---
        const SUPABASE_URL = 'YOUR_SUPABASE_URL';
        const SUPABASE_ANON_KEY = 'YOUR_SUPABASE_ANON_KEY';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const topics = [
            { id: 'computer', label: 'Computer Skills', icon: '💻' },
            { id: 'ai_basics', label: 'AI Basics', icon: '🧠' },
            { id: 'github', label: 'GitHub', icon: '🐙' },
            { id: 'vercel', label: 'Vercel', icon: '▲' },
            { id: 'gemini', label: 'Gemini', icon: '✨' },
            { id: 'chatgpt', label: 'ChatGPT', icon: '💬' },
            { id: 'claude', label: 'Claude', icon: '🎭' }
        ];

        // --- RENDER SKILL CARDS ---
        const container = document.getElementById('checklistContainer');
        container.innerHTML = topics.map(topic => `
            <div class="p-5 rounded-2xl border border-slate-100 bg-white/50 hover:border-indigo-200 transition-all group">
                <div class="flex items-center gap-3 mb-4">
                    <span class="text-2xl">${topic.icon}</span>
                    <h3 class="font-bold text-slate-800">${topic.label}</h3>
                </div>
                <div class="grid grid-cols-3 gap-2">
                    ${['None', 'Mid', 'Pro'].map((level, idx) => `
                        <label class="skill-card cursor-pointer">
                            <input type="radio" name="${topic.id}" value="${idx}" ${idx === 0 ? 'checked' : ''} class="hidden skill-input">
                            <div class="text-center py-2 rounded-xl border border-slate-200 text-xs font-bold text-slate-500 transition-all hover:bg-slate-50">
                                ${level}
                            </div>
                        </label>
                    `).join('')}
                </div>
            </div>
        `).join('');

        // --- CHART SETUP ---
        const ctx = document.getElementById('readinessChart').getContext('2d');
        const gradient = ctx.createLinearGradient(0, 0, 0, 400);
        gradient.addColorStop(0, 'rgba(79, 70, 229, 0.8)');
        gradient.addColorStop(1, 'rgba(99, 102, 241, 0.2)');

        let readinessChart = new Chart(ctx, {
            type: 'radar',
            data: {
                labels: topics.map(t => t.label),
                datasets: [{
                    data: topics.map(() => 0),
                    backgroundColor: gradient,
                    borderColor: '#4f46e5',
                    borderWidth: 3,
                    pointBackgroundColor: '#fff',
                    pointBorderColor: '#4f46e5',
                    pointHoverBackgroundColor: '#4f46e5',
                    pointRadius: 4
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    r: {
                        angleLines: { color: '#e2e8f0' },
                        grid: { color: '#e2e8f0' },
                        pointLabels: { font: { size: 10, weight: '600' }, color: '#64748b' },
                        ticks: { display: false },
                        beginAtZero: true,
                        max: 2
                    }
                },
                plugins: { legend: { display: false } }
            }
        });

        // --- LOGIC & INTERACTION ---
        function updateUI() {
            const inputs = document.querySelectorAll('.skill-input:checked');
            const scores = Array.from(inputs).map(input => parseInt(input.value));
            
            // Update Chart
            readinessChart.data.datasets[0].data = scores;
            readinessChart.update();

            // Update Badge
            const completedCount = Array.from(inputs).filter(i => i.value > 0).length;
            const badge = document.getElementById('completionBadge');
            badge.innerText = `${completedCount}/7 Skills Mastered`;
            if(completedCount > 0) {
                badge.classList.replace('bg-slate-100', 'bg-indigo-100');
                badge.classList.replace('text-slate-500', 'text-indigo-600');
            }
        }

        document.querySelectorAll('.skill-input').forEach(input => {
            input.addEventListener('change', updateUI);
        });

        // --- SUBMISSION ---
        document.getElementById('registrationForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.innerHTML = `<svg class="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> Processing...`;

            const payload = {
                full_name: document.getElementById('fullName').value,
                email: document.getElementById('email').value,
                phone: document.getElementById('phone').value,
                evaluation_scores: topics.reduce((acc, t) => {
                    acc[t.id] = parseInt(document.querySelector(`input[name="${t.id}"]:checked`).value);
                    return acc;
                }, {})
            };

            const { error } = await supabaseClient.from('trainees').insert([payload]);

            if (error) {
                alert("Error: " + error.message);
            } else {
                alert("Success! Your registration is complete.");
                location.reload();
            }
            btn.disabled = false;
        });

        updateUI();
    </script>
</body>
</html>
